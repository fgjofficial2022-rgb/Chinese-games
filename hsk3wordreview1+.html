<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🐼 三卡匹配 · HSK3 第11课（手机版）</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #0b3d91, #1a6bc4, #4da0e6);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px 10px 20px;
        }

        .game-container, .card .card-content.hanzi-text, .card .card-type,
        .greeting, .panda-msg, .score-box span, .progress-label,
        .complete-box h2, .complete-box .sub, .complete-box .panda-comment,
        .complete-box .time-used, .btn-play-again, .toast-msg, .download-btn {
            font-family: '楷体', 'KaiTi', 'STKaiti', '华文楷体', serif;
        }
        .card .card-content.pinyin-text,
        .card .card-content.english-text {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
        }

        .bamboo-leaf {
            position: fixed; pointer-events: none; font-size: 22px; opacity: 0.25;
            z-index: 0; animation: floatLeaf linear infinite; color: #2e7d32;
        }
        @keyframes floatLeaf {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.6); opacity: 0.15; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-10vh) rotate(720deg) scale(1.1); opacity: 0; }
        }

        .game-container {
            position: relative; z-index: 1; width: 100%; max-width: 460px;
            background: rgba(255,255,255,0.15); backdrop-filter: blur(16px);
            border-radius: 28px; padding: 12px 12px 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.30), 0 0 0 1px rgba(255,255,255,0.08);
            display: flex; flex-direction: column;
            min-height: calc(100vh - 30px);
            overflow: hidden;
        }

        .download-section {
            text-align: center;
            margin-top: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(255,255,255,0.12);
            flex-shrink: 0;
        }
        .download-btn {
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
            font-weight: 500;
        }
        .download-btn:active {
            transform: scale(0.95);
        }

        .header {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 8px; flex-shrink: 0; flex-wrap: wrap;
        }

        .panda-area {
            display: flex; align-items: center; gap: 4px; flex-shrink: 0;
            background: rgba(255,255,255,0.10); border-radius: 40px;
            padding: 2px 8px 2px 4px; backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.10);
        }
        .panda-wrapper {
            position: relative; width: 40px; height: 40px; flex-shrink: 0;
        }
        .panda-face {
            position: relative; width: 100%; height: 100%; border-radius: 50%;
            background: #f5f5f5; box-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }
        .panda-face::before, .panda-face::after {
            content: ''; position: absolute; width: 13px; height: 13px;
            background: #1a1a1a; border-radius: 50%; top: -2px; z-index: -1;
        }
        .panda-face::before { left: 1px; }
        .panda-face::after { right: 1px; }

        .eye-left, .eye-right {
            position: absolute; width: 11px; height: 15px; background: #1a1a1a;
            border-radius: 50%; top: 9px;
        }
        .eye-left { left: 4px; }
        .eye-right { right: 4px; }
        .eye-left::after, .eye-right::after {
            content: ''; position: absolute; width: 4px; height: 4px;
            background: white; border-radius: 50%; top: 2px; left: 2px;
        }
        .nose {
            position: absolute; width: 6px; height: 5px; background: #1a1a1a;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            top: 20px; left: 50%; transform: translateX(-50%);
        }
        .mouth {
            position: absolute; width: 10px; height: 6px; bottom: 5px;
            left: 50%; transform: translateX(-50%); transition: all 0.35s ease;
            border-radius: 0 0 16px 16px; border: 1.5px solid #1a1a1a;
            border-top: none; background: transparent;
        }
        .mouth.smile { height: 6px; border-radius: 0 0 16px 16px; }
        .mouth.happy { height: 9px; width: 14px; border-radius: 0 0 24px 24px; background: #1a1a1a; bottom: 4px; }
        .mouth.happy::after { content: ''; position: absolute; width: 6px; height: 3px; background: #f5f5f5; border-radius: 50%; top: 2px; left: 50%; transform: translateX(-50%); }
        .mouth.clap { height: 8px; width: 16px; border-radius: 0 0 24px 24px; background: #1a1a1a; bottom: 4px; }
        .mouth.clap::after { content: ''; position: absolute; width: 8px; height: 3px; background: #f5f5f5; border-radius: 50%; top: 2px; left: 50%; transform: translateX(-50%); }
        .mouth.celebrate { height: 10px; width: 18px; border-radius: 0 0 30px 30px; background: #1a1a1a; bottom: 3px; }
        .mouth.celebrate::after { content: '✨'; position: absolute; font-size: 9px; top: -14px; left: 50%; transform: translateX(-50%); animation: sparklePanda 1s infinite alternate; }
        @keyframes sparklePanda {
            0% { opacity: 0.4; transform: translateX(-50%) scale(0.8); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.2); }
        }
        .eye-left.happy-eye, .eye-right.happy-eye {
            height: 10px; border-radius: 50% 50% 30% 30%; top: 11px;
        }

        .bamboo-deco { display: flex; align-items: center; gap: 1px; margin-left: 2px; }
        .bamboo-stalk {
            width: 3px; height: 20px; background: linear-gradient(180deg, #388e3c, #2e7d32, #1b5e20);
            border-radius: 3px; position: relative;
        }
        .bamboo-stalk::before {
            content: ''; position: absolute; width: 5px; height: 1.5px; background: #43a047;
            border-radius: 3px; top: 7px; left: -1px; box-shadow: 0 7px 0 #43a047;
        }
        .bamboo-stalk::after {
            content: '🍃'; position: absolute; font-size: 10px; top: -4px; left: -3px;
            transform: rotate(-20deg);
        }
        .bamboo-stalk:nth-child(2) { height: 16px; margin-left: -1px; }
        .bamboo-stalk:nth-child(2)::after { font-size: 8px; top: -2px; left: -2px; transform: rotate(30deg); }

        .info-area { flex: 1; min-width: 100px; display: flex; flex-direction: column; gap: 1px; }
        .greeting { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.95); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .greeting .panda-msg { background: rgba(255,255,255,0.10); padding: 0 8px; border-radius: 20px; font-size: 10px; font-weight: 400; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.06); }

        .score-progress { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .score-box {
            background: rgba(255,255,255,0.10); padding: 1px 8px 1px 6px;
            border-radius: 30px; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 3px; font-weight: 700; color: #fff;
            font-size: 12px;
        }
        .score-box span { font-size: 10px; font-weight: 400; opacity: 0.7; }
        .score-box .score-num { font-size: 16px; font-weight: 800; min-width: 20px; text-align: center; color: #ffd54f; }

        .progress-wrap { flex: 1; min-width: 60px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 9px; color: rgba(255,255,255,0.6); font-weight: 500; margin-bottom: 1px; }
        .progress-track { width: 100%; height: 4px; background: rgba(255,255,255,0.15); border-radius: 20px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffd54f, #ffb300, #ff8f00); border-radius: 20px; transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            flex: 1;
            align-content: start;
            overflow: hidden;
        }

        .card {
            background: rgba(255,255,255,0.88); backdrop-filter: blur(8px);
            border-radius: 14px; padding: 8px 3px; text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.20);
            cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative; min-height: 56px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; user-select: none;
            border: 2px solid transparent;
            -webkit-tap-highlight-color: transparent;
            word-break: break-word;
        }
        .card:active:not(.matched):not(.disabled) { transform: scale(0.96); }
        .card .card-type {
            font-size: 8px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.3px; padding: 1px 5px; border-radius: 20px;
            background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.40);
            margin-bottom: 2px; flex-shrink: 0;
        }
        .card .card-content {
            font-weight: 600; color: #1a1a2e; line-height: 1.2;
            word-break: break-word; text-align: center; width: 100%;
        }
        .card .card-content.hanzi-text { font-size: 20px; }
        .card .card-content.pinyin-text { font-size: 13px; color: #1a237e; }
        .card .card-content.english-text { font-size: 12px; color: #004d40; }

        .card.selected {
            border-color: #ffd54f; transform: scale(1.04);
            box-shadow: 0 8px 24px rgba(255,213,79,0.25), 0 0 0 2px #ffd54f;
            background: rgba(255,255,255,0.95);
        }
        .card .select-order {
            position: absolute; top: -4px; right: -4px; width: 20px; height: 20px;
            background: #ffd54f; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 11px; font-weight: 800; color: #1a1a2e;
            box-shadow: 0 3px 8px rgba(255,213,79,0.3);
            opacity: 0; transform: scale(0.5); transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .card.selected .select-order { opacity: 1; transform: scale(1); }

        .card.matched {
            pointer-events: none;
            animation: cardMatchPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            border-color: #66bb6a;
        }
        @keyframes cardMatchPop {
            0% { transform: scale(1); opacity: 1; }
            30% { transform: scale(1.12); opacity: 1; background: rgba(102,187,106,0.3); }
            100% { transform: scale(0.4); opacity: 0; }
        }
        .card.wrong {
            animation: cardWrongShake 0.4s ease forwards;
            border-color: #ef5350;
        }
        @keyframes cardWrongShake {
            0% { transform: translateX(0); border-color: #ef5350; }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
            100% { transform: translateX(0); border-color: transparent; }
        }
        .card.disabled { pointer-events: none; opacity: 0.4; transform: scale(0.92); }

        .card.type-hanzi .card-type { background: rgba(255,87,34,0.12); color: #bf360c; }
        .card.type-pinyin .card-type { background: rgba(33,150,243,0.12); color: #0d47a1; }
        .card.type-english .card-type { background: rgba(76,175,80,0.12); color: #1b5e20; }

        .float-score {
            position: fixed; pointer-events: none; font-size: 26px; font-weight: 900;
            color: #ffd54f; text-shadow: 0 4px 16px rgba(255,213,79,0.5);
            z-index: 100; animation: floatUp 1.1s ease-out forwards;
            display: flex; align-items: center; gap: 4px;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.6); }
            30% { opacity: 1; transform: translateY(-25px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-110px) scale(1); }
        }
        .star-particle {
            position: fixed; pointer-events: none; font-size: 16px; z-index: 99;
            animation: starBurst 0.8s ease-out forwards;
        }
        @keyframes starBurst {
            0% { opacity: 1; transform: translate(0,0) scale(0.2) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.3) rotate(720deg); }
        }

        .complete-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.45);
            backdrop-filter: blur(12px); border-radius: 28px;
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 50; padding: 24px 16px;
            animation: fadeInOverlay 0.5s ease;
        }
        .complete-overlay.show { display: flex; }
        @keyframes fadeInOverlay {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .complete-box { text-align: center; max-width: 340px; }
        .complete-box .trophy { font-size: 52px; margin-bottom: 4px; animation: bounceTrophy 1s ease infinite alternate; }
        @keyframes bounceTrophy {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-8px) scale(1.05); }
        }
        .complete-box h2 { font-size: 26px; font-weight: 800; color: #fff; text-shadow: 0 4px 16px rgba(0,0,0,0.2); margin-bottom: 2px; }
        .complete-box .sub { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 2px; }
        .complete-box .final-score { font-size: 42px; font-weight: 900; color: #ffd54f; text-shadow: 0 4px 20px rgba(255,213,79,0.3); margin: 2px 0; }
        .complete-box .panda-comment { font-size: 16px; color: #fff; background: rgba(255,255,255,0.10); padding: 6px 16px; border-radius: 30px; display: inline-block; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.06); margin: 4px 0 8px; line-height: 1.4; }
        .complete-box .time-used { font-size: 14px; color: #a8d8ea; background: rgba(255,255,255,0.06); padding: 3px 16px; border-radius: 30px; display: inline-block; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.04); margin-bottom: 10px; }
        .btn-play-again {
            background: linear-gradient(135deg, #ffd54f, #ffb300); border: none;
            padding: 10px 32px; border-radius: 50px; font-size: 16px; font-weight: 700;
            color: #1a1a2e; cursor: pointer; box-shadow: 0 6px 20px rgba(255,213,79,0.3);
            transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-play-again:active { transform: scale(0.95); }

        .toast-msg {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) scale(0.8);
            background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); color: #fff;
            padding: 6px 18px; border-radius: 40px; font-size: 14px; font-weight: 600;
            z-index: 200; opacity: 0; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none; border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
            white-space: nowrap;
        }
        .toast-msg.show { opacity: 1; transform: translateX(-50%) scale(1); }
    </style>
</head>
<body>

    <div id="leafContainer"></div>

    <div class="game-container" id="app">
        <div class="header">
            <div class="panda-area">
                <div class="panda-wrapper">
                    <div class="panda-face" id="pandaFace">
                        <div class="eye-left" id="eyeLeft"></div>
                        <div class="eye-right" id="eyeRight"></div>
                        <div class="nose"></div>
                        <div class="mouth" id="mouth"></div>
                    </div>
                </div>
                <div class="bamboo-deco">
                    <div class="bamboo-stalk"></div>
                    <div class="bamboo-stalk"></div>
                </div>
            </div>
            <div class="info-area">
                <div class="greeting">
                    🐼 <span class="panda-msg" id="pandaMsg">来复习HSK3吧！</span>
                </div>
                <div class="score-progress">
                    <div class="score-box"><span>⭐</span><span class="score-num" id="scoreDisplay">0</span></div>
                    <div class="progress-wrap">
                        <div class="progress-label"><span>进度</span><span id="progressText">0 / 11</span></div>
                        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card-grid" id="cardGrid"></div>

        <div class="complete-overlay" id="completeOverlay">
            <div class="complete-box">
                <div class="trophy">🎉</div>
                <h2>Excellent!</h2>
                <div class="sub">你的得分</div>
                <div class="final-score" id="finalScore">0 / 110</div>
                <div class="panda-comment" id="pandaComment">🐼 继续加油！Keep going!</div>
                <div class="time-used" id="timeDisplay">⏱️ 用时: 0s</div>
                <button class="btn-play-again" id="playAgainBtn">🔄 再来一次</button>
            </div>
        </div>

        <div class="download-section">
            <button class="download-btn" id="downloadBtn">💾 下载此游戏</button>
        </div>
    </div>

    <div class="toast-msg" id="toastMsg"></div>

    <script>
        // ===== 词汇 =====
        const WORDS = [
            { id: 0, hanzi: '复习', pinyin: 'fùxí', english: 'review' },
            { id: 1, hanzi: '疼', pinyin: 'téng', english: 'hurt, painful' },
            { id: 2, hanzi: '裤子', pinyin: 'kùzi', english: 'trousers' },
            { id: 3, hanzi: '聪明', pinyin: 'cōngming', english: 'clever' },
            { id: 4, hanzi: '照顾', pinyin: 'zhàogù', english: 'take care of' },
            { id: 5, hanzi: '突然', pinyin: 'tūrán', english: 'suddenly' },
            { id: 6, hanzi: '结婚', pinyin: 'jiéhūn', english: 'marry' },
            { id: 7, hanzi: '满意', pinyin: 'mǎnyì', english: 'satisfied' },
            { id: 8, hanzi: '比较', pinyin: 'bǐjiào', english: 'rather, relatively' },
            { id: 9, hanzi: '骑', pinyin: 'qí', english: 'ride' },
            { id: 10, hanzi: '借', pinyin: 'jiè', english: 'borrow/lend' }
        ];

        // ===== 状态 =====
        let cards = [], selected = [], matchedIds = new Set(), score = 0, isProcessing = false;
        let totalWords = WORDS.length;
        let startTimestamp = null, elapsedSeconds = 0, timerInterval = null;

        const grid = document.getElementById('cardGrid');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const pandaMsg = document.getElementById('pandaMsg');
        const mouth = document.getElementById('mouth');
        const eyeLeft = document.getElementById('eyeLeft');
        const eyeRight = document.getElementById('eyeRight');
        const toast = document.getElementById('toastMsg');
        const completeOverlay = document.getElementById('completeOverlay');
        const finalScore = document.getElementById('finalScore');
        const pandaComment = document.getElementById('pandaComment');
        const timeDisplay = document.getElementById('timeDisplay');
        const playAgainBtn = document.getElementById('playAgainBtn');

        let toastTimer = null;

        // ===== 音效 =====
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function getAudioCtx() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
        function playTone(f, d, t='sine', v=0.3) { try { const ctx=getAudioCtx(); const o=ctx.createOscillator(); const g=ctx.createGain(); o.type=t; o.frequency.value=f; g.gain.setValueAtTime(v,ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d); o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+d); } catch(_){} }
        function soundClick() { playTone(1200,0.035,'sine',0.12); }
        function soundDing() { playTone(880,0.12); setTimeout(()=>playTone(1100,0.10),90); }
        function soundOops() { playTone(400,0.2,'sawtooth',0.18); setTimeout(()=>playTone(300,0.18,'sawtooth',0.12),130); }
        function soundClap() { for(let i=0;i<3;i++) setTimeout(()=>playTone(600+i*200,0.07,'sine',0.18),i*70); }
        function soundCelebrate() { const n=[523,587,659,784,880,988,1175]; n.forEach((f,i)=>setTimeout(()=>playTone(f,0.10,'sine',0.12),i*60)); }

        // ===== 计时 =====
        function startTimer() { if(timerInterval) clearInterval(timerInterval); startTimestamp=Date.now(); elapsedSeconds=0; }
        function stopTimer() { if(timerInterval){clearInterval(timerInterval);timerInterval=null;} if(startTimestamp) elapsedSeconds=Math.floor((Date.now()-startTimestamp)/1000); return elapsedSeconds; }
        function resetTimer() { if(timerInterval) clearInterval(timerInterval); timerInterval=null; startTimestamp=null; elapsedSeconds=0; }
        function formatTime(s) { if(s<60) return s+'s'; const m=Math.floor(s/60), sec=s%60; return m+'分'+sec+'秒'; }

        function shuffle(arr) { for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
        function randomBetween(min,max){ return Math.random()*(max-min)+min; }

        function buildCards() {
            const result = [];
            WORDS.forEach(w => {
                result.push({ wordId: w.id, type: 'hanzi', display: w.hanzi, matched: false });
                result.push({ wordId: w.id, type: 'pinyin', display: w.pinyin, matched: false });
                result.push({ wordId: w.id, type: 'english', display: w.english, matched: false });
            });
            return shuffle(result);
        }

        function render() {
            grid.innerHTML = '';
            cards.forEach((card, index) => {
                const div = document.createElement('div');
                div.className = `card type-${card.type}`;
                if (card.matched) div.classList.add('matched');
                const typeLabel = { hanzi:'汉字', pinyin:'拼音', english:'英文' }[card.type] || '';
                const contentClass = `${card.type}-text`;
                div.innerHTML = `<div class="card-type">${typeLabel}</div><div class="card-content ${contentClass}">${card.display}</div><div class="select-order"></div>`;
                // 只使用 click 事件，移动端同样有效
                div.addEventListener('click', () => onCardClick(index));
                grid.appendChild(div);
            });
            updateSelectionUI();
            updateProgressAndScore();
        }

        function updateSelectionUI() {
            const allCards = grid.querySelectorAll('.card');
            allCards.forEach((el, i) => {
                el.classList.remove('selected','wrong');
                const orderEl = el.querySelector('.select-order');
                const idx = selected.indexOf(i);
                if (idx !== -1 && !cards[i].matched) { el.classList.add('selected'); orderEl.textContent = idx+1; }
                else { orderEl.textContent = ''; }
            });
        }

        function updateProgressAndScore() {
            const done = matchedIds.size;
            const pct = totalWords > 0 ? (done/totalWords)*100 : 0;
            progressFill.style.width = `${pct}%`;
            progressText.textContent = `${done} / ${totalWords}`;
            scoreDisplay.textContent = score;
            updatePandaExpression();
            if (done === totalWords && totalWords > 0) {
                const used = stopTimer();
                setTimeout(() => showComplete(used), 500);
            }
        }

        function updatePandaExpression() {
            const s = score; let expr='normal', msg='';
            if (s >= 90) { expr='celebrate'; msg='🎉 太棒了！你是大师！'; }
            else if (s >= 60) { expr='clap'; msg='🤩 非常棒！继续加油！'; }
            else if (s >= 30) { expr='happy'; msg='😊 不错哦！再接再厉！'; }
            else { expr='normal'; msg='🙂 别灰心，多练习！'; }
            mouth.className = 'mouth';
            if (expr==='normal') mouth.classList.add('smile');
            else if (expr==='happy') mouth.classList.add('happy');
            else if (expr==='clap') mouth.classList.add('clap');
            else if (expr==='celebrate') mouth.classList.add('celebrate');
            eyeLeft.classList.toggle('happy-eye', expr==='happy' || expr==='clap' || expr==='celebrate');
            eyeRight.classList.toggle('happy-eye', expr==='happy' || expr==='clap' || expr==='celebrate');
            if (matchedIds.size === totalWords) msg = '🎉 你完成了所有配对！';
            pandaMsg.textContent = msg;
        }

        function showToast(text, dur=1200) {
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = text; toast.classList.add('show');
            toastTimer = setTimeout(() => { toast.classList.remove('show'); toastTimer=null; }, dur);
        }

        function spawnStars(x, y, count=10) {
            const emojis=['✨','⭐','🌟','💫'];
            for(let i=0;i<count;i++){
                const el=document.createElement('div'); el.className='star-particle';
                el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
                const a=randomBetween(0,Math.PI*2), d=randomBetween(50,150);
                el.style.setProperty('--tx', `${Math.cos(a)*d}px`);
                el.style.setProperty('--ty', `${Math.sin(a)*d - 50}px`);
                el.style.left = `${x+randomBetween(-15,15)}px`;
                el.style.top = `${y+randomBetween(-15,15)}px`;
                el.style.fontSize = `${randomBetween(14,26)}px`;
                document.body.appendChild(el);
                setTimeout(()=>el.remove(),850);
            }
        }

        function showFloatScore(x,y,isCorrect=true) {
            const el=document.createElement('div'); el.className='float-score';
            el.textContent = isCorrect ? '⭐⭐⭐ +10' : '❌ -10';
            el.style.color = isCorrect ? '#ffd54f' : '#ef5350';
            el.style.left = `${x-50}px`; el.style.top = `${y-15}px`;
            document.body.appendChild(el);
            setTimeout(()=>el.remove(),1200);
        }

        function onCardClick(index) {
            soundClick();
            if (isProcessing) return;
            const card = cards[index];
            if (card.matched) return;
            if (selected.includes(index)) { selected = selected.filter(i=>i!==index); updateSelectionUI(); return; }
            if (selected.length >= 3) return;
            selected.push(index); updateSelectionUI();
            if (selected.length === 3) checkMatch();
        }

        function checkMatch() {
            isProcessing = true;
            const indices = [...selected];
            const ids = indices.map(i => cards[i].wordId);
            const allSame = ids.every(id => id === ids[0]);

            if (allSame) {
                const wordId = ids[0];
                if (matchedIds.has(wordId)) { selected=[]; isProcessing=false; updateSelectionUI(); return; }
                soundDing();
                const rects = indices.map(i => grid.children[i].getBoundingClientRect());
                const cx = rects.reduce((s,r) => s + r.left + r.width/2, 0) / rects.length;
                const cy = rects.reduce((s,r) => s + r.top + r.height/2, 0) / rects.length;
                spawnStars(cx, cy, 10);
                showFloatScore(cx-30, cy-30, true);
                indices.forEach(i => { cards[i].matched = true; grid.children[i].classList.add('matched'); });
                matchedIds.add(wordId); score += 10;
                selected = [];
                updateProgressAndScore(); updateSelectionUI();
                const msgs = ['🐼 很棒！','🐼 太厉害了！','🐼 继续加油！','🐼 真聪明！'];
                if (score>=60) pandaMsg.textContent = '🤩 ' + msgs[Math.floor(Math.random()*msgs.length)];
                else if (score>=30) pandaMsg.textContent = '😊 ' + msgs[Math.floor(Math.random()*msgs.length)];
                else pandaMsg.textContent = '🙂 ' + msgs[Math.floor(Math.random()*msgs.length)];
                showToast('✨ Perfect Match! +10', 700);
                isProcessing = false;
            } else {
                soundOops();
                indices.forEach(i => grid.children[i].classList.add('wrong'));
                score -= 10; scoreDisplay.textContent = score; updatePandaExpression();
                const rects = indices.map(i => grid.children[i].getBoundingClientRect());
                const cx = rects.reduce((s,r) => s + r.left + r.width/2, 0) / rects.length;
                const cy = rects.reduce((s,r) => s + r.top + r.height/2, 0) / rects.length;
                showFloatScore(cx-25, cy-25, false);
                showToast('❌ 哎呀！ -10分', 500);
                setTimeout(() => {
                    indices.forEach(i => grid.children[i].classList.remove('wrong'));
                    selected = []; updateSelectionUI(); isProcessing = false;
                }, 450);
            }
        }

        function showComplete(usedSeconds) {
            soundCelebrate(); soundClap(); setTimeout(()=>soundClap(),350);
            const totalPossible = totalWords * 10;
            finalScore.textContent = `${score} / ${totalPossible}`;
            let comment = '';
            if (score >= 100) comment = '🏆 完美大师！You\'re a master!';
            else if (score >= 80) comment = '🌟 非常优秀！Excellent!';
            else if (score >= 60) comment = '👍 做得很好！Good job!';
            else if (score >= 40) comment = '💪 还不错！Keep it up!';
            else if (score >= 20) comment = '📚 加油！More practice!';
            else comment = '😅 别灰心！Don\'t give up!';
            pandaComment.textContent = '🐼 ' + comment;
            timeDisplay.textContent = `⏱️ 用时: ${formatTime(usedSeconds)}`;
            completeOverlay.classList.add('show');
            mouth.className = 'mouth celebrate';
            pandaMsg.textContent = '🎉 太棒了！你完成了！';
        }

        function resetGame() {
            completeOverlay.classList.remove('show');
            selected = []; matchedIds = new Set(); score = 0; isProcessing = false;
            resetTimer();
            cards = buildCards(); render(); updateProgressAndScore();
            pandaMsg.textContent = '🐼 来挑战吧！';
            mouth.className = 'mouth smile';
            eyeLeft.classList.remove('happy-eye'); eyeRight.classList.remove('happy-eye');
            startTimer();
            showToast('🔄 新的一局！加油！', 800);
        }

        // ===== 下载按钮 =====
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const htmlContent = document.documentElement.outerHTML;
            const blob = new Blob([htmlContent], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'HSK3_配对游戏_手机版.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        function initLeaves() {
            const container = document.getElementById('leafContainer');
            const emojis=['🍃','🌿','🍀','🎋'];
            for(let i=0;i<8;i++){
                const el=document.createElement('div'); el.className='bamboo-leaf';
                el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
                el.style.left=`${Math.random()*100}vw`;
                el.style.fontSize=`${randomBetween(16,30)}px`;
                el.style.animationDuration=`${randomBetween(14,30)}s`;
                el.style.animationDelay=`${randomBetween(0,18)}s`;
                el.style.opacity=randomBetween(0.12,0.3);
                container.appendChild(el);
            }
        }

        function init() {
            initLeaves();
            cards = buildCards(); render(); updateProgressAndScore();
            pandaMsg.textContent = '🐼 来挑战吧！';
            mouth.className = 'mouth smile';
            startTimer();
            playAgainBtn.addEventListener('click', resetGame);
            document.addEventListener('click', ()=>getAudioCtx(), { once: true });
        }
        init();
    </script>
</body>
</html>
